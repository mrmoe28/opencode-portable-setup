<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode portable setup install flow</title>
  <desc id="desc">Terminal screenshot showing clone and install commands for the OpenCode portable setup repository.</desc>
  <rect width="960" height="520" fill="#111317"/>
  <rect x="28" y="28" width="904" height="464" rx="8" fill="#1b1f24" stroke="#30363d"/>
  <circle cx="58" cy="56" r="7" fill="#ff5f56"/>
  <circle cx="82" cy="56" r="7" fill="#ffbd2e"/>
  <circle cx="106" cy="56" r="7" fill="#27c93f"/>
  <text x="132" y="62" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#c9d1d9">terminal</text>
  <text x="52" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ git clone https://github.com/mrmoe28/opencode-portable-setup.git</text>
  <text x="52" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#8b949e">Cloning into 'opencode-portable-setup'...</text>
  <text x="52" y="184" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ cd opencode-portable-setup</text>
  <text x="52" y="220" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ ./scripts/install.sh</text>
  <text x="52" y="266" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Installed OpenCode setup.</text>
  <text x="52" y="302" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Config: /home/user/.config/opencode/opencode.json</text>
  <text x="52" y="338" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Vault: /home/user/jarvis-vault</text>
  <text x="52" y="374" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Restart your terminal and OpenCode.</text>
  <rect x="52" y="420" width="448" height="36" rx="6" fill="#238636"/>
  <text x="72" y="444" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16" fill="#ffffff">OpenCode config + memory vault ready</text>
</svg>
