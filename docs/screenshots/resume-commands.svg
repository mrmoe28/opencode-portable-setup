<svg xmlns="http://www.w3.org/2000/svg" width="960" height="500" viewBox="0 0 960 500" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode resume and verification commands</title>
  <desc id="desc">Terminal screenshot showing commands for verifying memory, listing sessions, and resuming the last OpenCode session.</desc>
  <rect width="960" height="500" fill="#0d1117"/>
  <rect x="30" y="30" width="900" height="440" rx="8" fill="#161b22" stroke="#30363d"/>
  <circle cx="60" cy="58" r="7" fill="#ff5f56"/>
  <circle cx="84" cy="58" r="7" fill="#ffbd2e"/>
  <circle cx="108" cy="58" r="7" fill="#27c93f"/>
  <text x="52" y="114" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ opencode run 'Read my OpenCode memory and reply OK'</text>
  <text x="52" y="152" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">OK</text>
  <text x="52" y="214" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ opencode session list</text>
  <text x="52" y="252" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">abc123  my-app  2026-05-15</text>
  <text x="52" y="314" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ opencode --continue</text>
  <text x="52" y="352" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#c9d1d9">Resuming latest session...</text>
  <text x="52" y="414" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#7ee787">$ ocr</text>
  <text x="126" y="414" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#8b949e"># helper for opencode --continue</text>
</svg>
